<!DOCTYPE html>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #F5F3EE;
      font-family: Georgia, serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border: 1.5px solid #E4DFD8;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 440px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);

    .logo {
      font-size: 42px;
      font-weight: 900;
      letter-spacing: -1px;

    }

      font-family: monospace;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 36px;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #E4DFD8;
      border-top-color: #1A5FAB;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .message {
      font-size: 16px;
      color: #4A4A4A;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .message strong { color: #1A1A1A; }
    .btn {
      display: inline-block;
      background: #1A5FAB;
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      padding: 14px 28px;
      font-size: 15px;
      font-family: monospace;
      font-weight: 700;
      letter-spacing: 1px;
      transition: background 0.2s;
    }
    .btn:hover { background: #154d8f; }
    .note {
      font-size: 11px;
      color: #bbb;
      font-family: monospace;
      margin-top: 20px;
    }
